name: dbt CD Pipeline

on:
  push:
    branches:
      - main

env:
  DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
  DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
  DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
  DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
  DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
  DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
  DBT_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}

jobs:
  # ==========================================
  # JOB 1: STAGING LAYER
  # ==========================================
  staging-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Run Snapshots
        run: dbt snapshot --profiles-dir .

      - name: Build Staging Layer
        run: dbt run --select "stg_*" --profiles-dir .

  # ==========================================
  # JOB 2: INTERMEDIATE LAYER
  # ==========================================
  intermediate-job:
    runs-on: ubuntu-latest
    needs: staging-job # <-- Waits for staging to pass
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      # Build ONLY the internal data preparation models
      - name: Build Intermediate Layer
        run: dbt run --select "int_*" --profiles-dir .

  # ==========================================
  # JOB 3: ANALYTICAL MARTS LAYER
  # ==========================================
  marts-job:
    runs-on: ubuntu-latest
    needs: intermediate-job # <-- Now waits for the intermediate layer to finish processing!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Build Marts Layer
        run: dbt run --select "dim_* fct_*" --profiles-dir .

  # ==========================================
  # JOB 4: DOCUMENTATION GENERATION
  # ==========================================
  docs-job:
    runs-on: ubuntu-latest
    needs: marts-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Generate Documentation
        run: dbt docs generate --profiles-dir .

      - name: Serve Documentation
        run: |
          dbt docs serve --port 8080 &
          SERVER_PID=$!
          sleep 5
          curl -I http://localhost:8080
          kill $SERVER_PID