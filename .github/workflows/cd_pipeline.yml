name: dbt CD Pipeline

on:
  push:
    branches:
      - main

env:
  DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
  DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
  DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
  DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
  DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
  DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
  DBT_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}
  DBT_DEV_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_DEV_SNOWFLAKE_SCHEMA }}

jobs:
  
  # Job Snapshots + Staging Layer 
  staging-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Run Snapshots
        run: dbt snapshot --profiles-dir . --target prod
        
      - name: Build Staging Layer
        run: dbt build --select "stg_*" --profiles-dir . --target prod

  # Job Intermediate Layer
  intermediate-job:
    runs-on: ubuntu-latest
    needs: staging-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Build Intermediate Layer
        run: dbt build --select "int_*" --profiles-dir .

  # Job Marts Layer
  marts-job:
    runs-on: ubuntu-latest
    needs: intermediate-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Build Marts Layer
        run: dbt build --select "dim_* fct_*" --profiles-dir .

  # Documentation Generation Job
  docs-job:
    runs-on: ubuntu-latest
    needs: marts-job
    
    # We need to give the runner permission to push to the gh-pages branch
    permissions:
      contents: write 
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install dbt-snowflake

      - name: Install Packages
        run: dbt deps

      - name: Generate Documentation
        run: dbt docs generate --profiles-dir . --target prod

      # This action takes the target folder and hosts it on GitHub Pages
      - name: Deploy Docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target