name: dbt CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  ci-dbt:
    runs-on: ubuntu-latest
    
    env:
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}
      DBT_DEV_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_DEV_SNOWFLAKE_SCHEMA }}

    steps:

      # Checkout Main
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      - name: Install dbt Packages, Compile Code & Generate Baseline Manifest
        run: |
          dbt deps
          dbt compile --profiles-dir . --target prod
          mkdir -p state
          cp target/manifest.json state/

      # Checkout PR branch
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          clean: false 

      - name: Compile PR Code
        run: |
          dbt deps
          dbt compile --profiles-dir . --target prod

      # Run modified models only, using the baseline manifest for state comparison
      - name: Run Modified Models Only
        run: dbt run --select state:modified --state ./state --profiles-dir . --target prod

      - name: Enforce Standards (dbt-project-evaluator)
        run: dbt run --select package:dbt_project_evaluator --profiles-dir . --target prod