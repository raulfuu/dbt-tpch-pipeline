name: dbt CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  ci-dbt:
    runs-on: ubuntu-latest
    
    env:
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      # Download current production branch into a temporary folder
      - name: Checkout Production (Main) Branch
        uses: actions/checkout@v3
        with:
          ref: main
          path: prod_code_baseline

      # Compile production code to create the comparison manifest
      - name: Build Production Comparison State
        run: |
          cd prod_code_baseline
          dbt deps
          dbt compile --profiles-dir ..
          cd ..

      - name: Install dbt Packages
        run: dbt deps

      - name: Run Modified Models Only
        run: dbt run --select state:modified --state prod_code_baseline/target --profiles-dir .

      - name: Enforce Standards (dbt-project-evaluator)
        run: dbt run --select package:dbt_project_evaluator --profiles-dir .