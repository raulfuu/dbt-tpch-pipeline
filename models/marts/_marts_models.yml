version: 2

models:
  - name: dim_customers
    description: "Type 1 Dimension for customer data. Denormalized to include nation and region details."
    columns:
      - name: customer_id
        description: "Primary key for the customer."
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer."
      - name: customer_address
        description: "Physical address."
      - name: phone_number
        description: "Contact number."
      - name: account_balance
        description: "Current account balance of the customer."
      - name: market_segment
        description: "Assigned market segment."
      - name: nation_name
        description: "Customer's nation."
      - name: region_name
        description: "Customer's region."
      - name: segment_manager
        description: "The name of the executive responsible for managing this customer's market segment. Sourced from the segment_managers seed file."
      - name: profit_target
        description: "The annual profit target assigned to this customer's market segment. Sourced from the segment_managers seed file."

  - name: dim_suppliers
    description: "Type 1 Dimension for supplier data."
    columns:
      - name: supplier_id
        description: "Primary key for the supplier."
        tests:
          - unique
          - not_null
      - name: supplier_name
        description: "Registered name of the supplier."
      - name: supplier_address
        description: "Physical address."
      - name: phone_number
        description: "Contact number."
      - name: account_balance
        description: "Current account balance."
      - name: nation_name
        description: "Supplier's nation."
      - name: region_name
        description: "Supplier's region."

  - name: dim_parts
    description: "Type 1 Dimension for the master product catalog."
    columns:
      - name: part_id
        description: "Primary key for the part."
        tests:
          - unique
          - not_null
      - name: part_name
        description: "Name of the part."
      - name: manufacturer
        description: "Manufacturer name."
      - name: brand
        description: "Brand category."
      - name: part_type
        description: "Physical type description."
      - name: part_size
        description: "Size metric."
      - name: container
        description: "Packaging type."
      - name: retail_price
        description: "Standard retail price."

  - name: fct_sales
    description: "Core sales fact table at the line-item grain."
    columns:
      - name: order_id
        description: "Foreign key joining to order."
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key joining to customer."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: part_id
        description: "Foreign key joining to part."
        tests:
          - not_null
          - relationships:
              to: ref('dim_parts')
              field: part_id
      - name: supplier_id
        description: "Foreign key joining to supplier."
        tests:
          - not_null
          - relationships:
              to: ref('dim_suppliers')
              field: supplier_id
      - name: order_date
        description: "Date the order was placed."
      - name: order_status
        description: "Overall fulfillment status."
      - name: total_line_items
        description: "Count of raw lines rolled up."
      - name: total_quantity
        description: "Total physical units sold."
      - name: gross_amount
        description: "Baseline revenue before discounts/taxes."
      - name: discounted_amount
        description: "Revenue after discounts."
      - name: net_amount_with_tax
        description: "Final recognized revenue after discounts and taxes."
      - name: total_cost
        description: "Total cost of goods sold based on supply cost."
      - name: net_profit
        description: "Calculated profit as net revenue minus total cost."
      - name: _loaded_at
        description: "Audit metadata: The exact timestamp when this row was materialized by Snowflake."
      - name: _dbt_invocation_id
        description: "Audit metadata: The unique dbt execution ID that processed this pipeline run. Used for traceability."

exposures:
  - name: executive_sales_dashboard
    label: "Executive Sales Dashboard (Looker)"
    type: dashboard
    url: "https://lookerstudio.google.com/"
    description: "Primary Looker Studio dashboard consumed by the C-Suite. Tracks gross revenue, COGS, and net profit margins."
    depends_on:
      - ref('fct_sales')
      - ref('dim_customers')
    owner:
      name: "Data Analytics Team"
      email: "analytics@company.com"

  - name: pricing_anomaly_app
    label: "Pricing Anomaly Detector (Streamlit)"
    type: application
    url: "https://share.streamlit.io/"
    description: "Interactive Streamlit web application used by Data Science to detect historical pricing anomalies and margin erosion."
    depends_on:
      - ref('fct_sales')
      - ref('dim_parts')
    owner:
      name: "Data Science Team"
      email: "data_science@company.com"